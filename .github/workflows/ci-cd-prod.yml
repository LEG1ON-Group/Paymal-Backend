name: Java PROD CD (Backend)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Copy JAR to server
        run: |
          scp target/*.jar root@${{ secrets.HOST }}:/root/Websites/Paymal/backend/app.jar

      - name: Restart Backend
        run: |
          ssh root@${{ secrets.HOST }} "
            systemctl restart paymal-backend
          "

      # ✅ SUCCESS notification
      - name: Send success message to Telegram
        if: success()
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          AUTHOR="${{ github.actor }}"
          BRANCH="${{ github.ref_name }}"
          TIME=$(date '+%Y-%m-%d %H:%M:%S')

          curl -s -X POST https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage \
            -d chat_id="-1003766976778" \
            -d parse_mode=Markdown \
            -d text="✅ *PAYMAL BACKEND PROD* muvaffaqiyatli deploy qilindi! 🚀%0A%0A🕓 *${TIME}*%0A👤 *${AUTHOR}*%0A🌿 Branch: *${BRANCH}*%0A📝 Commit: _${COMMIT_MSG}_"

      # ❌ FAILURE notification
      - name: Send failure message to Telegram
        if: failure()
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          AUTHOR="${{ github.actor }}"
          BRANCH="${{ github.ref_name }}"
          TIME=$(date '+%Y-%m-%d %H:%M:%S')

          curl -s -X POST https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage \
            -d chat_id="-1003766976778" \
            -d parse_mode=Markdown \
            -d text="❌ *PAYMAL BACKEND PROD* deploy bo‘lmadi!%0A%0A🕓 *${TIME}*%0A👤 *${AUTHOR}*%0A🌿 Branch: *${BRANCH}*%0A📝 Commit: _${COMMIT_MSG}_"