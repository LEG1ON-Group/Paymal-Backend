spring.application.name=Paymal
server.port=${PORT}
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=create
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
spring.jackson.time-zone=Asia/Tashkent
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Tashkent
recaptcha.secret-key=${RECAPTCHA_SECRET_KEY}
click.service.id=${CLICK_SERVICE_ID}
click.merchant.id=${CLICK_MERCHANT_ID}
click.payment.base.url=https://my.click.uz/services/pay
click.secret.key=${CLICK_SECRET_KEY}
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.group.id=${TELEGRAM_GROUP_ID}
